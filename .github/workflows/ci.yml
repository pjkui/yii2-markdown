name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # ── Job 1：PHPUnit + Jest 单元测试 ───────────────────────────────────────
  unit:
    name: Unit Tests (PHP ${{ matrix.php }} / Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
        node: ['20']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, pdo, json
          coverage: none

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install Node dependencies
        run: npm install --no-audit --no-fund

      - name: Run PHPUnit
        run: vendor/bin/phpunit --colors=never

      - name: Run Jest (with coverage)
        run: npx jest --coverage --coverageDirectory=coverage --collectCoverageFrom='src/dist/converter.js' --coverageReporters=text

  # ── Job 2：Playwright E2E 测试（msedge） ─────────────────────────────────
  e2e:
    name: E2E Tests (Playwright / msedge)
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, pdo, json
          coverage: none

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install Node dependencies
        run: npm install --no-audit --no-fund

      - name: Install Microsoft Edge (stable)
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/edge stable main" | sudo tee /etc/apt/sources.list.d/microsoft-edge.list
          sudo apt-get update
          sudo apt-get install -y microsoft-edge-stable

      - name: Install Playwright msedge dependencies
        run: npx playwright install --with-deps msedge

      - name: Update visual snapshots (linux baseline)
        # 首次在新平台运行时写入基准快照，后续推送才做真正的视觉回归比对
        run: npx playwright test tests/e2e/ --project=msedge --update-snapshots -g "R6" --reporter=list
        env:
          CI: true

      - name: Run Playwright E2E (msedge)
        run: npx playwright test tests/e2e/ --project=msedge --reporter=list
        env:
          CI: true

      - name: Commit updated snapshots
        # 若有新的 linux 快照文件，自动 commit 回 master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/regression.spec.js-snapshots/
          git diff --cached --quiet || git commit -m "ci: update visual snapshots for linux [skip ci]"
          git push || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
