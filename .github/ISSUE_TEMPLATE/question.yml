name: 问题咨询 (Question)
description: 使用方法、配置、最佳实践等问题
title: "[Question] "
labels: ["question", "status:todo"]
body:
  - type: markdown
    attributes:
      value: |
        请先搜索已有 Issues / Discussions，避免重复。
  - type: textarea
    id: question
    attributes:
      label: 问题
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: 已尝试的方案
      description: 贴出你查过的文档、尝试过的代码，以便定位。
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: yii2-markdown / Yii / PHP 版本
      placeholder: 例如 v2.x.x / 2.0.49 / 8.2
    validations:
      required: false
